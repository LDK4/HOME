<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="7PFyy7VogxV_gE1SaHBg6twgJYE2jqzKk-EpsRh2hlI" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>HOME | MVP Binance Project</title>
    <meta name="description" content="Página oficial do projeto MVP Binance. Aguarde o redirecionamento para a nossa plataforma de testes.">
    <meta name="robots" content="index, follow">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0e11;
            color: #eaecef;
            text-align: center;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: #1e2329;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 90%;
            border: 1px solid #333;
        }

        h1 { color: #ffffff; font-size: 26px; }
        p { color: #b7bdc6; line-height: 1.6; }

        .highlight {
            font-weight: bold;
            color: #f3ba2f;
            font-size: 48px;
            display: block;
            margin: 25px 0;
            text-shadow: 0 0 15px rgba(243, 186, 47, 0.3);
        }

        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 15px 30px;
            background-color: #f3ba2f;
            color: #000;
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: #ffca42;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Iniciando Conexão</h1>
        <p>Você será levado ao <strong>MVP Binance</strong> em alguns segundos.</p>
        
        <div id="countdown-container">
            <span id="contador" class="highlight">5</span>
        </div>

        <a href="https://ldk4.github.io/MVPbinance/" class="btn">ACESSAR AGORA</a>
    </div>

    <script>
        let tempoRestante = 5; 
        const urlDestino = "https://ldk4.github.io/MVPbinance/"; 
        const elementoContador = document.getElementById('contador');

        const contagem = setInterval(() => {
            tempoRestante--;
            if (tempoRestante >= 0) elementoContador.textContent = tempoRestante;
            if (tempoRestante <= 0) {
                clearInterval(contagem);
                window.location.href = urlDestino;
            }
        }, 1000);
    </script>

</body>
</html>
