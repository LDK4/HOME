<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecionando...</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0e11; 
            color: #eaecef;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: #1e2329; 
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 90%;
            border: 1px solid #333;
        }

        h1 { color: #ffffff; font-size: 26px; margin-bottom: 15px; }

        .highlight {
            font-weight: bold;
            color: #f3ba2f; 
            font-size: 48px;
            display: block;
            margin: 20px 0;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            background-color: #f3ba2f;
            color: #000;
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            transition: 0.3s;
            cursor: pointer;
            border: none;
            width: 100%;
            box-sizing: border-box;
        }

        .btn:hover { background-color: #ffca42; transform: scale(1.02); }

        /* SEÇÃO PIX VISÍVEL */
        .pix-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #333;
            display: block !important; /* Força a exibição */
        }

        .pix-box {
            background: #2b3139;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            border: 1px dashed #f3ba2f;
            color: #f3ba2f;
            margin-top: 10px;
            word-wrap: break-word;
        }

        #copy-status {
            font-size: 12px;
            color: #02c076;
            margin-top: 8px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Conectando...</h1>
        <p>Você será redirecionado para o <strong>MVP Binance</strong> em:</p>
        
        <span id="contador" class="highlight">10</span>

        <a href="https://ldk4.github.io/MVPbinance/" class="btn">ACESSAR AGORA</a>

        <div class="pix-section">
            <p style="font-size: 14px; color: #ffffff; margin-bottom: 5px;">Apoie o desenvolvedor ☕</p>
            <p style="font-size: 12px; color: #b7bdc6;">Clique na chave abaixo para copiar:</p>
            <div class="pix-box" onclick="copyPix()">
                <span id="pix-key">desouzanunes10o@gmail.com</span>
            </div>
            <div id="copy-status">✓ Chave Pix copiada com sucesso!</div>
        </div>
    </div>

    <script>
        let tempo = 10; 
        const url = "https://ldk4.github.io/MVPbinance/";
        const elContador = document.getElementById('contador');

        const timer = setInterval(() => {
            tempo--;
            elContador.textContent = tempo;
            if (tempo <= 0) {
                clearInterval(timer);
                window.location.href = url;
            }
        }, 1000);

        function copyPix() {
            const text = document.getElementById('pix-key').innerText;
            navigator.clipboard.writeText(text).then(() => {
                document.getElementById('copy-status').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('copy-status').style.display = 'none';
                }, 2500);
            });
        }
    </script>
</body>
</html>
